{% extends 'base.html' %}

{% block layout %}
<div x-data="{ mobileMenuOpen: false }">
    <!-- Mobile sidebar off-canvas -->
    <div x-show="mobileMenuOpen" class="relative z-50 lg:hidden" aria-modal="true" x-cloak>
        <div x-show="mobileMenuOpen" x-transition.opacity class="fixed inset-0 bg-slate-900/80"></div>
        <div class="fixed inset-0 flex">
            <div x-show="mobileMenuOpen" 
                 x-transition:enter="transition ease-in-out duration-300 transform" 
                 x-transition:enter-start="-translate-x-full" 
                 x-transition:enter-end="translate-x-0" 
                 x-transition:leave="transition ease-in-out duration-300 transform" 
                 x-transition:leave-start="translate-x-0" 
                 x-transition:leave-end="-translate-x-full" 
                 class="relative mr-16 flex w-full max-w-xs flex-1">
                
                <div class="absolute left-full top-0 flex w-16 justify-center pt-5">
                    <button type="button" @click="mobileMenuOpen = false" class="-m-2.5 p-2.5">
                        <span class="sr-only">Close sidebar</span>
                        <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <!-- Re-use the sidebar component code or include it but mobile version handling -->
                {% include "components/sidebar.html" %}
            </div>
        </div>
    </div>

    <!-- Static sidebar for desktop -->
    <div class="hidden lg:fixed lg:inset-y-0 lg:z-50 lg:flex lg:w-72 lg:flex-col">
        {% include "components/sidebar.html" %}
    </div>

    <div class="lg:pl-72 flex flex-col h-full">
        <!-- Top Navigation -->
        {% include "components/topnav.html" %}

        <!-- Main Content Area -->
        <main class="py-10 bg-slate-50 flex-grow">
            <div class="px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</div>

<!-- Pusher Real-time Notifications -->
<script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
<script>
    const PUSHER_KEY = "{{ pusher_key|default:'' }}";
    const PUSHER_CLUSTER = "{{ pusher_cluster|default:'mt1' }}";
    const USER_ID = "{{ user.id }}";

    if (PUSHER_KEY && USER_ID) {
        const pusher = new Pusher(PUSHER_KEY, {
            cluster: PUSHER_CLUSTER
        });

        const channel = pusher.subscribe(`user-${USER_ID}`);
        channel.bind('new-notification', function(data) {
            console.log('New notification received:', data);

            // 1. Alert Icon Animation
            const bellIcon = document.getElementById('notification-bell-icon');
            if (bellIcon) {
                bellIcon.classList.add('animate-swing');
            }

            // 2. Show/Update Red Dot Badge
            let badge = document.getElementById('notification-badge');
            if (!badge) {
                const bellBtn = document.getElementById('notification-bell-btn');
                if (bellBtn) {
                    const badgeHtml = `
                        <span id="notification-badge" class="absolute top-2 right-2 flex h-2.5 w-2.5">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500"></span>
                        </span>
                    `;
                    bellBtn.insertAdjacentHTML('beforeend', badgeHtml);
                }
            }

            // 3. Update Count Badge
            const countBadge = document.getElementById('notification-count-badge');
            if (countBadge) {
                let currentText = countBadge.textContent.trim();
                let currentCount = parseInt(currentText) || 0;
                countBadge.textContent = (currentCount + 1) + ' new';
                countBadge.classList.remove('hidden');
            }

            // 4. Add to Dropdown List
            const listContainer = document.getElementById('notification-dropdown-list');
            if (listContainer) {
                // Remove empty message if exists
                const emptyMsg = document.getElementById('no-notifications-msg');
                if (emptyMsg) emptyMsg.remove();

                const newNotifHtml = `
                    <a href="${data.link}" class="block px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 border-b border-slate-50 bg-slate-50/50">
                        <div class="flex items-start gap-2">
                            <span class="mt-1.5 h-1.5 w-1.5 shrink-0 rounded-full bg-blue-600"></span>
                            <div>
                                <p class="text-slate-900 font-semibold">${data.title}</p>
                                <p class="text-xs mt-0.5 line-clamp-2">${data.message}</p>
                                <p class="text-[10px] text-slate-400 mt-1">Just now</p>
                            </div>
                        </div>
                    </a>
                `;
                listContainer.insertAdjacentHTML('afterbegin', newNotifHtml);
            }
            
            // 5. Toast Alert (Pop-up message)
            window.dispatchEvent(new CustomEvent('notify', {
                detail: {
                    type: 'info',
                    title: data.title,
                    message: data.message
                }
            }));
        });
    }
</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Real-time filtering logic
    document.querySelectorAll('.realtime-filter').forEach(form => {
        let timer;
        const targetId = form.dataset.target || 'table-container';
        
        form.addEventListener('input', (e) => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                const url = new URL(window.location.href);
                const formData = new FormData(form);
                for (let [key, value] of formData.entries()) {
                    url.searchParams.set(key, value);
                }
                url.searchParams.set('page', 1); // reset to page 1 on new filter
                
                fetch(url.toString(), {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(r => r.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newContent = doc.getElementById(targetId);
                    const oldContent = document.getElementById(targetId);
                    if (newContent && oldContent) {
                        oldContent.innerHTML = newContent.innerHTML;
                        if (window.Alpine) {
                            window.Alpine.initTree(oldContent);
                        }
                        window.history.pushState({}, '', url.toString());
                    }
                });
            }, 300);
        });
        
        // Handle change events for selects
        form.addEventListener('change', (e) => {
            if (e.target.tagName === 'SELECT') {
                form.dispatchEvent(new Event('input'));
            }
        });
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
        });
    });
});
</script>
{% endblock %}
