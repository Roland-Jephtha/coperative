{% extends 'base.html' %}
{% block title %}Password Changed — CoopSaaS{% endblock %}

{% block layout %}
<div class="min-h-screen bg-slate-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white shadow-xl rounded-2xl p-8 border border-slate-200 text-center">
        <div class="mx-auto h-12 w-12 bg-green-100 rounded-full flex items-center justify-center mb-4">
            <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900">Password Changed!</h2>
        <p class="mt-2 text-sm text-slate-500">Your account is now secure. You can continue to your dashboard.</p>
        
        <div class="mt-8">
            <a href="/" class="w-full flex justify-center py-3 px-4 rounded-lg shadow-sm text-sm font-bold text-white bg-primary-600 hover:bg-primary-500 transition-all">
                Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
