{# templates/components/button.html #}
{% comment %}
Usage:
{% include "components/button.html" with type="primary" text="Approve Loan" icon="check" url="#" submit=False %}
{% endcomment %}

{% if submit %}
<button type="submit"
{% else %}
<a href="{{ url|default:'#' }}"
{% endif %}
    class="inline-flex items-center justify-center rounded-md text-sm font-semibold shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 transition-all duration-200 
    {% if type == 'primary' %}
        bg-primary-600 text-white hover:bg-primary-500 focus-visible:outline-primary-600 px-3 py-2
    {% elif type == 'secondary' %}
        bg-slate-100 text-slate-900 hover:bg-slate-200 focus-visible:outline-slate-500 px-3 py-2
    {% elif type == 'danger' %}
        bg-red-600 text-white hover:bg-red-500 focus-visible:outline-red-600 px-3 py-2
    {% elif type == 'outline' %}
        bg-white text-slate-900 ring-1 ring-inset ring-slate-300 hover:bg-slate-50 px-3 py-2
    {% elif type == 'icon' %}
        rounded-full p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-500
    {% else %}
        bg-primary-600 text-white hover:bg-primary-500 focus-visible:outline-primary-600 px-3 py-2
    {% endif %}"
    {% if id %}id="{{ id }}"{% endif %}
    {% if xclick %} @click="{{ xclick }}"{% endif %}>
    
    {% if icon %}
        <!-- Simple lucide/heroicon mapping handled in SVG directly if needed, for now just simple icon handling if passed -->
    {% endif %}
    
    {{ text }}

{% if submit %}
</button>
{% else %}
</a>
{% endif %}
