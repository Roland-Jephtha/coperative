<div x-data="{ 
    notifications: [],
    add(type, title, message) {
        const id = Date.now();
        this.notifications.push({ id, type, title, message });
        setTimeout(() => this.remove(id), 5000);
    },
    remove(id) {
        this.notifications = this.notifications.filter(n => n.id !== id);
    }
}" 
@notify.window="add($event.detail.type, $event.detail.title, $event.detail.message)"
class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 w-full max-w-sm pointer-events-none">
    
    <template x-for="notification in notifications" :key="notification.id">
        <div x-data="{ show: false, progress: 100 }"
             x-init="setTimeout(() => show = true, 50); 
                    let interval = setInterval(() => { if(progress > 0) progress -= 0.5; else clearInterval(interval) }, 25)"
             x-show="show"
             x-transition:enter="transition ease-out duration-300 transform"
             x-transition:enter-start="translate-x-full opacity-0 scale-95"
             x-transition:enter-end="translate-x-0 opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-200 transform"
             x-transition:leave-start="translate-x-0 opacity-100 scale-100"
             x-transition:leave-end="translate-x-full opacity-0 scale-95"
             class="pointer-events-auto relative overflow-hidden bg-white/95 backdrop-blur-sm rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-slate-200/50 p-4 ring-1 ring-slate-900/5">
            
            <div class="flex items-start gap-4">
                <!-- Icon -->
                <div class="flex-shrink-0">
                    <template x-if="notification.type === 'success'">
                        <div class="bg-emerald-100 p-2 rounded-full">
                            <svg class="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                            </svg>
                        </div>
                    </template>
                    <template x-if="notification.type === 'error'">
                        <div class="bg-rose-100 p-2 rounded-full">
                            <svg class="h-5 w-5 text-rose-600" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                            </svg>
                        </div>
                    </template>
                    <template x-if="notification.type === 'info'">
                        <div class="bg-sky-100 p-2 rounded-full">
                            <svg class="h-5 w-5 text-sky-600" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
                            </svg>
                        </div>
                    </template>
                </div>

                <!-- Text content -->
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-slate-900 font-display" x-text="notification.title"></p>
                    <p class="mt-0.5 text-xs text-slate-500 leading-relaxed" x-text="notification.message"></p>
                </div>

                <!-- Close Button -->
                <button @click="remove(notification.id)" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="absolute bottom-0 left-0 h-1 bg-slate-100 w-full">
                <div :style="`width: ${progress}%`" 
                     :class="{
                        'bg-emerald-500': notification.type === 'success',
                        'bg-rose-500': notification.type === 'error',
                        'bg-sky-500': notification.type === 'info'
                     }"
                     class="h-full transition-all duration-[25ms] ease-linear">
                </div>
            </div>
        </div>
    </template>
</div>

<!-- Initial message sync -->
{% if messages %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            {% for message in messages %}
                window.dispatchEvent(new CustomEvent('notify', {
                    detail: {
                        type: '{{ message.tags }}' === 'error' ? 'error' : ('{{ message.tags }}' === 'success' ? 'success' : 'info'),
                        title: '{{ message.tags|title|default:"System" }}',
                        message: '{{ message|escapejs }}'
                    }
                }));
            {% endfor %}
        }, 100);
    });
</script>
{% endif %}
